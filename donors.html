<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Donors — IGC Sudama Sewa</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="mobile-bar"><button class="hamburger" id="hamburger">☰</button><span class="font-cinzel text-gold" style="font-size:14px">IGC Sudama Sewa</span></div>
    <div class="page-header">
      <div style="flex:1"><h2 class="text-gold" style="font-size:18px">👥 Donor Profiles</h2><p class="text-muted text-sm mt-1" id="summary-text">Loading...</p></div>
      <button class="btn btn-primary hidden" id="add-btn" onclick="openModal()">➕ Add Donor</button>
    </div>
    <div class="page-body">
      <div class="card mb-3">
        <div class="flex gap-2" style="flex-wrap:wrap">
          <input class="form-input" style="flex:1;min-width:160px" id="search" placeholder="🔍 Name, mobile, team..." oninput="render()"/>
          <select class="form-select" style="width:auto" id="f-dept" onchange="render()"><option value="">All Departments</option></select>
          <select class="form-select" style="width:auto" id="f-status" onchange="render()">
            <option value="active">Active</option><option value="">All</option><option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="donors-grid" id="donors-grid"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal modal-lg">
    <div class="modal-header"><h3 id="modal-title">👤 Add Donor</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <input type="hidden" id="edit-id"/>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="f-name" placeholder="Donor's full name"/></div>
      <div class="form-group"><label class="form-label">Mobile Number</label><input class="form-input" id="f-mobile" placeholder="10-digit number"/></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Department *</label><select class="form-select" id="f-dep" onchange="updateTeams()"></select></div>
      <div class="form-group"><label class="form-label">Team *</label><select class="form-select" id="f-team"></select></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Frequency</label>
        <select class="form-select" id="f-freq" onchange="toggleAmt()"><option>Regular</option><option>Irregular</option></select>
      </div>
      <div class="form-group"><label class="form-label">Fixed Amount (₹/month)</label><input class="form-input" type="number" id="f-amt" placeholder="e.g. 500"/></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f-notes" rows="2" placeholder="Additional notes..."></textarea></div>
    <div class="form-group hidden" id="status-row">
      <label class="form-label">Status</label>
      <select class="form-select" id="f-status2"><option value="active">Active</option><option value="inactive">Inactive (Old Devotee)</option></select>
    </div>
    <div class="flex gap-2" style="justify-content:flex-end;margin-top:8px">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveDonor()">➕ Add Donor</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script>
var donors=[], isAdmin=false;
Object.keys(DEPARTMENTS_TEAMS).forEach(function(d){ document.getElementById("f-dept").innerHTML+='<option value="'+d+'">'+d+'</option>'; });

initPage("donors.html", function(info) {
  isAdmin=info.isAdmin;
  if(isAdmin) document.getElementById("add-btn").classList.remove("hidden");
  document.getElementById("f-dep").innerHTML=buildDeptOptions();
  db.collection("donors").orderBy("name").get().then(function(snap){
    donors=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}); render();
  });
});

function render() {
  var search=(document.getElementById("search").value||"").toLowerCase();
  var dept=document.getElementById("f-dept").value;
  var status=document.getElementById("f-status").value;
  var filt=donors.filter(function(d){
    var ms=!search||((d.name||"").toLowerCase().includes(search)||(d.mobile||"").includes(search)||(d.team||"").toLowerCase().includes(search));
    return ms&&(!dept||d.department===dept)&&(!status||d.status===status);
  });
  document.getElementById("summary-text").textContent=filt.length+" donors · Regular: "+donors.filter(function(d){return d.frequency==="Regular"&&d.status==="active";}).length;
  if(!filt.length){
    document.getElementById("donors-grid").innerHTML='<div class="card text-center" style="grid-column:1/-1;padding:50px"><div style="font-size:44px;margin-bottom:12px">👥</div><p class="text-muted mb-3">No donors found</p>'+(isAdmin?'<button class="btn btn-primary" onclick="openModal()">Add First Donor</button>':"")+'</div>';
    return;
  }
  document.getElementById("donors-grid").innerHTML=filt.map(function(d){
    var rb=d.frequency==="Regular"?'<span class="badge badge-saffron">🔄 Regular</span>':'<span class="badge badge-gold">⚡ Irregular</span>';
    var sb=d.status==="active"?'<span class="badge badge-success">Active</span>':'<span class="badge badge-danger">Inactive</span>';
    var border=d.frequency==="Regular"&&d.status==="active"?"rgba(255,107,0,.3)":"var(--border)";
    var acts=isAdmin?'<div class="flex gap-2 mt-2" style="padding-top:10px;border-top:1px solid var(--border)"><button class="btn btn-outline btn-sm" onclick="editDonor(\''+d.id+'\')">✏️ Edit</button><button class="btn btn-sm" style="background:'+(d.status==="active"?"rgba(245,158,11,.1)":"rgba(34,197,94,.1)")+';color:'+(d.status==="active"?"var(--warning)":"var(--success)")+';border:1px solid '+(d.status==="active"?"rgba(245,158,11,.3)":"rgba(34,197,94,.3)")+'" onclick="toggleStatus(\''+d.id+'\',\''+d.status+'\')">'+(d.status==="active"?"⏸ Deactivate":"▶ Reactivate")+'</button><button class="btn btn-danger btn-sm" onclick="delDonor(\''+d.id+'\')">🗑️</button></div>':"";
    return '<div class="card" style="border-color:'+border+';opacity:'+(d.status==="inactive"?"0.6":"1")+'"><div class="flex justify-between items-center mb-2"><div><div class="font-bold" style="font-size:14px">'+(d.name||"")+'</div>'+(d.mobile?'<div class="text-muted text-sm mt-1">📱 '+d.mobile+'</div>':"")+'</div><div class="flex gap-1" style="flex-direction:column;align-items:flex-end">'+rb+sb+'</div></div><div class="text-muted text-sm" style="display:flex;flex-direction:column;gap:3px"><span>🏛️ '+(d.department||"")+'</span><span>👥 '+(d.team||"")+'</span>'+(d.frequency==="Regular"&&d.defaultAmount>0?'<span class="text-gold">💰 ₹'+d.defaultAmount+'/month</span>':"")+'</div>'+acts+'</div>';
  }).join("");
}

function openModal(){
  document.getElementById("edit-id").value="";
  document.getElementById("modal-title").textContent="👤 Add Donor";
  document.getElementById("save-btn").textContent="➕ Add Donor";
  ["f-name","f-mobile","f-notes"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("f-dep").innerHTML=buildDeptOptions();
  document.getElementById("f-team").innerHTML=buildTeamOptions("");
  document.getElementById("f-freq").value="Regular";
  document.getElementById("f-amt").value="";
  document.getElementById("status-row").classList.add("hidden");
  document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show");}
function updateTeams(){document.getElementById("f-team").innerHTML=buildTeamOptions(document.getElementById("f-dep").value);}
function toggleAmt(){document.getElementById("f-amt").disabled=document.getElementById("f-freq").value!=="Regular";}

function editDonor(id){
  var d=donors.find(function(x){return x.id===id;}); if(!d) return;
  document.getElementById("edit-id").value=id;
  document.getElementById("modal-title").textContent="✏️ Edit Donor";
  document.getElementById("save-btn").textContent="✅ Update";
  document.getElementById("f-name").value=d.name||"";
  document.getElementById("f-mobile").value=d.mobile||"";
  document.getElementById("f-dep").innerHTML=buildDeptOptions(d.department||"");
  document.getElementById("f-team").innerHTML=buildTeamOptions(d.department||"",d.team||"");
  document.getElementById("f-freq").value=d.frequency||"Regular";
  document.getElementById("f-amt").value=d.defaultAmount||"";
  document.getElementById("f-notes").value=d.notes||"";
  document.getElementById("f-status2").value=d.status||"active";
  document.getElementById("status-row").classList.remove("hidden");
  document.getElementById("modal").classList.add("show");
}
function saveDonor(){
  var name=document.getElementById("f-name").value.trim();
  var mobile=document.getElementById("f-mobile").value.trim();
  var dept=document.getElementById("f-dep").value;
  var team=document.getElementById("f-team").value;
  var freq=document.getElementById("f-freq").value;
  var amt=parseFloat(document.getElementById("f-amt").value)||0;
  var notes=document.getElementById("f-notes").value.trim();
  var status=document.getElementById("f-status2").value||"active";
  var editId=document.getElementById("edit-id").value;
  if(!name) return toast("Name is required","error");
  if(!dept||!team) return toast("Select department and team","error");
  var btn=document.getElementById("save-btn"); btn.disabled=true; btn.textContent="Saving...";
  var payload={name:name,mobile:mobile,department:dept,team:team,frequency:freq,defaultAmount:amt,notes:notes,status:status,updatedAt:new Date().toISOString()};
  var p=editId?db.collection("donors").doc(editId).update(payload):(payload.createdAt=new Date().toISOString(),db.collection("donors").add(payload));
  p.then(function(){toast(editId?"Donor updated! ✅":"Donor added! 🙏");closeModal();return db.collection("donors").orderBy("name").get();})
  .then(function(snap){donors=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});render();btn.disabled=false;})
  .catch(function(e){toast(e.message,"error");btn.disabled=false;});
}
function toggleStatus(id,current){
  var ns=current==="active"?"inactive":"active";
  db.collection("donors").doc(id).update({status:ns}).then(function(){
    toast("Donor marked "+ns); donors=donors.map(function(d){return d.id===id?Object.assign({},d,{status:ns}):d;}); render();
  });
}
function delDonor(id){
  if(!confirm("Delete this donor?")) return;
  db.collection("donors").doc(id).delete().then(function(){toast("Deleted");donors=donors.filter(function(d){return d.id!==id;});render();});
}
</script>
</body>
</html>
