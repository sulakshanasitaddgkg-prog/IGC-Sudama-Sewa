<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Departments — IGC Sudama Sewa</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="toast-container"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="mobile-bar"><button class="hamburger" id="hamburger">☰</button><span class="font-cinzel text-gold" style="font-size:14px">IGC Sudama Sewa</span></div>
    <div class="page-header">
      <div style="flex:1"><h2 class="text-gold" style="font-size:18px">🏛️ Departments &amp; Teams</h2><p class="text-muted text-sm mt-1">Monthly Target: ₹5,000 per team</p></div>
      <div class="flex gap-2">
        <select class="form-select" style="width:auto" id="fy-sel" onchange="render()">
          <option value="2024-25">FY 2024-25</option><option value="2025-26" selected>FY 2025-26</option><option value="2026-27">FY 2026-27</option>
        </select>
        <select class="form-select" style="width:auto" id="month-sel" onchange="render()">
          <option value="all">All Months</option>
          <option value="4">April</option><option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option><option value="9">September</option>
          <option value="10">October</option><option value="11">November</option><option value="12">December</option>
          <option value="1">January</option><option value="2">February</option><option value="3">March</option>
        </select>
      </div>
    </div>
    <div class="page-body">
      <div class="card card-gold mb-3"><h3 class="text-gold mb-3" style="font-size:13px">📊 Department Comparison</h3><canvas id="dept-chart" height="180"></canvas></div>
      <div id="dept-list"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script>
var donations=[], deptChart=null;

initPage("departments.html", function(info) {
  db.collection("donations").orderBy("date","desc").get().then(function(snap){
    donations=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}); render();
  });
});

function render() {
  var fy=document.getElementById("fy-sel").value;
  var month=document.getElementById("month-sel").value;
  var filt=fyFilter(donations,fy,month);
  var mc=(month==="all"||!month)?12:1;

  var deptData=Object.keys(DEPARTMENTS_TEAMS).map(function(dept){
    var teams=DEPARTMENTS_TEAMS[dept];
    var tot=filt.filter(function(d){return d.department===dept&&d.mode!=="Kind";}).reduce(function(s,d){return s+(d.amount||0);},0);
    var tgt=teams.length*MONTHLY_TARGET*mc;
    var pct=Math.min(100,Math.round(tot/tgt*100))||0;
    var teamData=teams.map(function(team){
      var td=filt.filter(function(d){return d.team===team&&d.mode!=="Kind";});
      var tt=td.reduce(function(s,d){return s+(d.amount||0);},0);
      var tp=Math.min(100,Math.round(tt/(MONTHLY_TARGET*mc)*100))||0;
      return {team:team,tt:tt,tp:tp,count:td.length};
    }).sort(function(a,b){return b.tt-a.tt;});
    return {dept:dept,tot:tot,tgt:tgt,pct:pct,teams:teamData};
  }).sort(function(a,b){return b.tot-a.tot;});

  // Bar chart
  if(deptChart) deptChart.destroy();
  var ctx=document.getElementById("dept-chart").getContext("2d");
  deptChart=new Chart(ctx,{
    type:"bar",
    data:{labels:deptData.map(function(d){return d.dept.slice(0,8);}),datasets:[{data:deptData.map(function(d){return d.tot;}),backgroundColor:deptData.map(function(d){return achColor(d.pct);}),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(v){return formatINR(v.raw);}}}},
      scales:{x:{ticks:{color:"#997755",font:{size:11}},grid:{display:false}},y:{ticks:{color:"#997755",font:{size:11},callback:function(v){return v>=1000?"₹"+(v/1000)+"k":"₹"+v;}},grid:{color:"rgba(255,255,255,.04)"}}}}
  });

  // Dept cards
  document.getElementById("dept-list").innerHTML=deptData.map(function(row){
    var border=row.pct>=80?"rgba(34,197,94,.3)":row.pct>=50?"rgba(245,158,11,.2)":"var(--border)";
    var col=achColor(row.pct);
    var teamRows=row.teams.map(function(t){
      return '<div style="background:rgba('+(t.tp>=80?"34,197,94":t.tp>=50?"245,158,11":"239,68,68")+',.07);border:1px solid '+achColor(t.tp)+'33;border-radius:8px;padding:10px 13px;margin-bottom:8px">'+
        '<div class="flex justify-between items-center mb-1">'+
          '<div><span class="font-bold" style="font-size:13px">'+t.team+'</span><span class="text-muted text-sm" style="margin-left:7px">'+t.count+' txn</span></div>'+
          '<div class="flex gap-3 items-center"><span class="font-bold text-gold">'+formatINR(t.tt)+'</span><span class="text-muted text-sm">/ '+formatINR(MONTHLY_TARGET*mc)+'</span><span style="font-weight:700;font-size:12px;color:'+achColor(t.tp)+'">'+t.tp+'%</span></div>'+
        '</div>'+
        '<div class="progress-wrap"><div class="progress-fill" style="width:'+t.tp+'%;background:'+achColor(t.tp)+'"></div></div>'+
      '</div>';
    }).join("");
    return '<div class="card mb-3" style="border-color:'+border+'">'+
      '<div onclick="toggleDept(this)" style="cursor:pointer">'+
        '<div class="flex justify-between items-center mb-2">'+
          '<div class="flex items-center gap-3"><span style="font-size:20px">🏛️</span>'+
            '<div><h3 style="font-size:14px;font-family:Cinzel,serif">'+row.dept+'</h3><span class="text-muted text-sm">'+row.teams.length+' teams</span></div>'+
          '</div>'+
          '<div class="flex items-center gap-3">'+
            '<div style="text-align:right"><div class="font-bold text-gold" style="font-size:17px">'+formatINR(row.tot)+'</div><div class="text-muted text-sm">of '+formatINR(row.tgt)+'</div></div>'+
            '<div style="width:52px;height:52px;border-radius:50%;background:conic-gradient('+col+' '+(row.pct*3.6)+'deg,rgba(255,255,255,.06) 0deg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:'+col+'">'+row.pct+'%</div>'+
            '<span class="toggle-arrow text-muted" style="font-size:16px">▼</span>'+
          '</div>'+
        '</div>'+
        '<div class="progress-wrap"><div class="progress-fill" style="width:'+row.pct+'%;background:linear-gradient(90deg,'+col+','+col+'88)"></div></div>'+
      '</div>'+
      '<div class="team-details"><div style="padding-top:14px;border-top:1px solid var(--border);margin-top:12px">'+
        '<p class="text-muted text-sm mb-2" style="text-transform:uppercase;letter-spacing:.5px">Team-wise Performance</p>'+
        teamRows+
      '</div></div>'+
    '</div>';
  }).join("");
}

function toggleDept(header) {
  var card=header.closest?header.closest(".card"):header.parentElement;
  var det=card.querySelector(".team-details");
  var arrow=header.querySelector(".toggle-arrow");
  det.classList.toggle("open");
  if(arrow) arrow.textContent=det.classList.contains("open")?"▲":"▼";
}
</script>
</body>
</html>
