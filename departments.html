<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Departments — IGC Sudama Sewa</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .dept-card { margin-bottom:16px; cursor:pointer; }
    .dept-card .dept-header { display:flex; justify-content:space-between; align-items:center; }
    .donut-ring {
      width:56px; height:56px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700;
    }
    .team-row {
      border-radius:8px; padding:11px 14px; margin-bottom:10px;
    }
    .team-details { display:none; }
    .team-details.open { display:block; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="mobile-bar"><button class="hamburger" id="hamburger">☰</button><span class="font-cinzel text-gold" style="font-size:14px;">IGC Sudama Sewa</span></div>

    <div class="page-header">
      <div style="flex:1">
        <h2 class="text-gold" style="font-size:19px;">🏛️ Departments & Teams</h2>
        <p class="text-muted text-sm mt-1">Monthly Target: ₹5,000 per team</p>
      </div>
      <div class="flex gap-2">
        <select class="form-select" style="width:auto" id="fy-sel" onchange="render()">
          <option value="2024-25">FY 2024-25</option>
          <option value="2025-26" selected>FY 2025-26</option>
          <option value="2026-27">FY 2026-27</option>
        </select>
        <select class="form-select" style="width:auto" id="month-sel" onchange="render()">
          <option value="all">All Months</option>
          <option value="4">April</option><option value="5">May</option>
          <option value="6">June</option><option value="7">July</option>
          <option value="8">August</option><option value="9">September</option>
          <option value="10">October</option><option value="11">November</option>
          <option value="12">December</option><option value="1">January</option>
          <option value="2">February</option><option value="3">March</option>
        </select>
      </div>
    </div>

    <div class="page-body">
      <!-- Comparison chart -->
      <div class="card card-gold mb-3">
        <h3 class="text-gold mb-3" style="font-size:14px;">📊 Department Comparison</h3>
        <canvas id="dept-chart" height="180"></canvas>
      </div>
      <!-- Dept cards -->
      <div id="dept-list"></div>
    </div>
  </div>
</div>

<script type="module">
  import { db, collection, getDocs, query, orderBy, initSidebar,
           DEPARTMENTS_TEAMS, MONTHLY_TARGET, FY_MONTHS, formatINR, achColor, achBadge, fyFilter }
    from "./app.js";

  let donations=[], deptChart=null;

  async function init() {
    await initSidebar("departments.html");
    const snap = await getDocs(query(collection(db,"donations"), orderBy("date","desc")));
    donations  = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }

  window.render = () => {
    const fy    = document.getElementById("fy-sel").value;
    const month = document.getElementById("month-sel").value;
    const filt  = fyFilter(donations, fy, month);
    const mc    = month==="all" ? 12 : 1;

    const deptData = Object.keys(DEPARTMENTS_TEAMS).map(dept=>{
      const teams = DEPARTMENTS_TEAMS[dept];
      const tot   = filt.filter(d=>d.department===dept&&d.mode!=="Kind").reduce((s,d)=>s+(d.amount||0),0);
      const tgt   = teams.length * MONTHLY_TARGET * mc;
      const pct   = Math.min(100, Math.round(tot/tgt*100))||0;
      const teamData = teams.map(team=>{
        const td  = filt.filter(d=>d.team===team&&d.mode!=="Kind");
        const tt  = td.reduce((s,d)=>s+(d.amount||0),0);
        const tp  = Math.min(100,Math.round(tt/(MONTHLY_TARGET*mc)*100))||0;
        return {team,tt,tp,count:td.length};
      }).sort((a,b)=>b.tt-a.tt);
      return {dept,tot,tgt,pct,teams:teamData};
    }).sort((a,b)=>b.tot-a.tot);

    // Bar chart
    if (deptChart) deptChart.destroy();
    const ctx = document.getElementById("dept-chart").getContext("2d");
    deptChart = new Chart(ctx,{
      type:"bar",
      data:{
        labels: deptData.map(d=>d.dept.slice(0,7)),
        datasets:[{
          data: deptData.map(d=>d.tot),
          backgroundColor: deptData.map(d=>achColor(d.pct)),
          borderRadius:4, borderSkipped:false
        }]
      },
      options:{ responsive:true, plugins:{legend:{display:false},
        tooltip:{callbacks:{label:v=>formatINR(v.raw)}}},
        scales:{
          x:{ticks:{color:"#997755",font:{size:11}},grid:{display:false}},
          y:{ticks:{color:"#997755",font:{size:11},callback:v=>v>=1000?`₹${v/1000}k`:`₹${v}`},grid:{color:"rgba(255,255,255,.04)"}}
        }}
    });

    // Dept cards
    document.getElementById("dept-list").innerHTML = deptData.map(({dept,tot,tgt,pct,teams})=>{
      const col = achColor(pct);
      const borderCol = pct>=80?"rgba(34,197,94,.3)":pct>=50?"rgba(245,158,11,.2)":"var(--border)";
      const donutStyle = `background:conic-gradient(${col} ${pct*3.6}deg, rgba(255,255,255,.06) 0deg)`;

      const teamRows = teams.map(({team,tt,tp,count})=>`
        <div class="team-row" style="background:rgba(${tp>=80?"34,197,94":tp>=50?"245,158,11":"239,68,68"},.07);border:1px solid ${achColor(tp)}22">
          <div class="flex justify-between items-center mb-1">
            <div>
              <span class="font-bold" style="font-size:14px">${team}</span>
              <span class="text-muted text-sm" style="margin-left:8px">${count} transaction${count!==1?"s":""}</span>
            </div>
            <div class="flex gap-3 items-center">
              <span class="font-bold text-gold">${formatINR(tt)}</span>
              <span class="text-muted text-sm">/ ${formatINR(MONTHLY_TARGET*mc)}</span>
              <span style="font-weight:700;font-size:13px;color:${achColor(tp)}">${tp}%</span>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-fill" style="width:${tp}%;background:${achColor(tp)}"></div>
          </div>
        </div>`).join("");

      return `<div class="card dept-card" style="border-color:${borderCol}" onclick="toggleDept(this)">
        <div class="dept-header" style="margin-bottom:12px">
          <div class="flex items-center gap-3">
            <span style="font-size:20px">🏛️</span>
            <div>
              <h3 style="font-size:15px;font-family:Cinzel,serif">${dept}</h3>
              <span class="text-muted text-sm">${teams.length} teams</span>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div style="text-align:right">
              <div class="font-bold text-gold" style="font-size:18px">${formatINR(tot)}</div>
              <div class="text-muted text-sm">of ${formatINR(tgt)}</div>
            </div>
            <div class="donut-ring" style="${donutStyle};color:${col}">${pct}%</div>
            <span class="text-muted" style="font-size:18px">▼</span>
          </div>
        </div>
        <div class="progress-wrap" style="margin-bottom:4px">
          <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}88)"></div>
        </div>
        <div class="team-details">
          <div style="padding-top:16px;border-top:1px solid var(--border);margin-top:14px">
            <p class="text-muted text-sm" style="margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Team-wise Performance</p>
            ${teamRows}
          </div>
        </div>
      </div>`;
    }).join("");
  };

  window.toggleDept = (card) => {
    const det = card.querySelector(".team-details");
    const arrow = card.querySelector("span:last-child");
    det.classList.toggle("open");
    arrow.textContent = det.classList.contains("open") ? "▲" : "▼";
  };

  init();
</script>
</body>
</html>
